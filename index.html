<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cuadro Timing — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bd:#080c14;--bc:#0e1525;--bca:#121a2e;--bh:#1a2744;
  --br:rgba(99,145,255,.08);--brb:rgba(99,145,255,.2);
  --ac:#4d8bff;--tp:#e8edf5;--ts:#7a8ba8;--tm:#4a5a75;
  --gn:#2dd4a0;--gnb:rgba(45,212,160,.08);--gnbr:rgba(45,212,160,.25);
  --rd:#ff6b7a;--rdb:rgba(255,107,122,.08);--rdbr:rgba(255,107,122,.25);
  --or:#ffb347;--orb:rgba(255,179,71,.08);
  --yl:#ffd760;--ylb:rgba(255,215,96,.08);
}
body{font-family:'Outfit',sans-serif;background:var(--bd);color:var(--tp);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 600px at 15% 10%,rgba(77,139,255,.04),transparent 70%),radial-gradient(ellipse 600px 400px at 85% 80%,rgba(45,212,160,.03),transparent 70%);pointer-events:none;z-index:0}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;height:100vh;position:relative;z-index:1}
.lbox{background:var(--bc);border:1px solid var(--brb);border-radius:16px;padding:44px 38px;width:370px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.lbox h2{font-size:24px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#fff,var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lbox p{font-size:13px;color:var(--ts);margin-bottom:24px}
.lbox input[type=password]{width:100%;padding:13px 16px;background:var(--bd);border:1px solid var(--br);color:var(--tp);border-radius:10px;font-family:'JetBrains Mono';font-size:15px;outline:0;text-align:center;letter-spacing:4px;transition:border .2s}
.lbox input:focus{border-color:var(--ac)}
.lbox button{width:100%;padding:14px;margin-top:16px;background:linear-gradient(135deg,var(--ac),#3b6fdb);color:#fff;border:0;border-radius:10px;font-family:'Outfit';font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s}
.lbox button:hover{transform:scale(1.02)}
.lerr{color:var(--rd);font-size:12px;margin-top:12px;display:none}

/* APP */
#app{display:none;position:relative;z-index:1}

.hdr{padding:22px 28px 18px;border-bottom:1px solid var(--br);background:linear-gradient(180deg,rgba(14,21,37,.95),var(--bd))}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px}
.hdr h1{font-size:24px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#fff,var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:12px;color:var(--ts);margin-top:5px}
@media(max-width:640px){.hdr h1{font-size:18px}.hdr .sub{font-size:11px}}

.kpis{display:flex;gap:10px;flex-wrap:wrap}
.kpi{background:var(--bc);border:1px solid var(--br);border-radius:10px;padding:11px 18px;text-align:center;min-width:105px;transition:border .2s,transform .2s}
.kpi:hover{border-color:var(--brb);transform:translateY(-1px)}
.kpi-v{font-family:'JetBrains Mono';font-size:20px;font-weight:600;line-height:1}
.kpi-l{font-size:10px;color:var(--ts);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
@media(max-width:640px){.kpi-v{font-size:16px}.kpi{padding:8px 12px;min-width:85px}}

.flt{display:flex;gap:14px;padding:14px 28px;flex-wrap:wrap;align-items:flex-end;border-bottom:1px solid var(--br);background:rgba(14,21,37,.5)}
.fg label{display:block;font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fg select{background:var(--bc);border:1px solid var(--br);color:var(--tp);border-radius:8px;padding:8px 12px;font-family:'Outfit';font-size:13px;outline:0;cursor:pointer;min-width:100px;transition:border .2s}
.fg select:focus{border-color:var(--ac)}
.fsep{width:1px;height:30px;background:var(--brb);align-self:flex-end;margin-bottom:5px}

/* Alerts */
.apn{padding:12px 28px}
.atg{background:0;border:1px solid var(--br);color:var(--ts);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Outfit';font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:8px;transition:border .2s}
.atg:hover{border-color:var(--brb);color:var(--tp)}
.bdg{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.bdg-c{background:var(--rd);color:#fff}.bdg-w{background:var(--or);color:#111}.bdg-o{background:var(--gn);color:#111}
.als{display:none;flex-direction:column;gap:4px;margin-top:8px;max-height:350px;overflow-y:auto}
.ali{padding:7px 14px;border-radius:7px;font-size:12px;display:flex;align-items:center;gap:8px;border:1px solid transparent;animation:asl .3s ease-out}
@keyframes asl{from{opacity:0;transform:translateX(-8px)}}
.ali.critica{background:var(--rdb);border-color:var(--rdbr);color:var(--rd)}
.ali.alta{background:var(--orb);border-color:rgba(255,179,71,.25);color:var(--or)}
.ali.media{background:var(--ylb);border-color:rgba(255,215,96,.25);color:var(--yl)}
.ali.info{background:var(--gnb);border-color:var(--gnbr);color:var(--gn)}

/* Insights cards */
.insights{padding:12px 28px;display:flex;gap:10px;flex-wrap:wrap}
.ins{background:var(--bc);border:1px solid var(--br);border-radius:10px;padding:14px 18px;flex:1;min-width:230px;transition:border .2s}
.ins:hover{border-color:var(--brb)}
.ins h4{font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600}
.ins-i{font-size:12px;padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:8px}
.ins-t{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}

/* Table */
.twrap{padding:10px 20px 14px;overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px}
thead th{position:sticky;top:0;z-index:2;font-weight:600;padding:9px 7px;text-align:center;border-bottom:2px solid var(--brb)}
.ths{background:var(--bca);font-size:12px;font-weight:700;border-right:1px solid var(--brb)}
.ths.dp{background:linear-gradient(135deg,#111c35,#152040);color:var(--ac)}
.thu{background:var(--bc);font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:.4px;font-weight:500}
.thu.se{border-right:1px solid var(--brb)}
th.thsd{background:var(--bca);position:sticky;left:0;z-index:3;text-align:left;min-width:68px;border-right:2px solid var(--brb)}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--bh)!important}
tbody tr:nth-child(even){background:rgba(14,21,37,.3)}
td{padding:7px 7px;border-bottom:1px solid var(--br);white-space:nowrap;font-family:'JetBrains Mono';font-size:10.5px}
td.sc{position:sticky;left:0;z-index:1;background:var(--bd);font-family:'Outfit';font-weight:600;color:var(--ac);font-size:11px;border-right:2px solid var(--brb)}
tbody tr:nth-child(even) td.sc{background:rgba(8,12,20,.95)}
tbody tr:hover td.sc{background:var(--bh)}
td.n{text-align:right}td.p{text-align:center}
td.tg{color:var(--gn);background:var(--gnb);font-weight:600;text-align:center}
td.tb{color:var(--rd);background:var(--rdb);font-weight:600;text-align:center}
td.vg{color:var(--gn);background:var(--gnb);font-weight:500;text-align:center}
td.vb{color:var(--rd);background:var(--rdb);font-weight:500;text-align:center}
td.se{border-right:1px solid var(--brb)}
tr.ttr td{background:linear-gradient(90deg,#111c35,#152040)!important;font-weight:700;color:#fff;border-bottom:0;padding:9px 7px}
tr.ttr td.sc{background:linear-gradient(90deg,#111c35,#152040)!important;color:#fff;font-size:12px}

/* Ranking */
.rkn{padding:10px 28px 28px}
.rkn h3{font-size:12px;font-weight:600;color:var(--tm);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.rki{display:flex;align-items:center;gap:10px;padding:5px 12px;border-radius:6px;margin-bottom:4px;background:var(--bc);border:1px solid var(--br);transition:border .2s}
.rki:hover{border-color:var(--brb)}
.rk-s{width:40px;font-weight:600;font-size:11px;color:var(--ac)}
.rk-bg{flex:1;height:16px;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden;position:relative}
.rk-b{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.rk-b.g{background:linear-gradient(90deg,var(--gn),rgba(45,212,160,.4))}
.rk-b.b{background:linear-gradient(90deg,var(--rd),rgba(255,107,122,.4))}
.rk-m{position:absolute;top:0;bottom:0;width:1.5px;background:rgba(255,255,255,.25)}
.rk-v{width:58px;text-align:right;font-family:'JetBrains Mono';font-size:11px;font-weight:600}
.rk-ic{width:16px;font-size:12px;text-align:center}

.ftr{text-align:center;padding:16px;color:var(--tm);font-size:10px;border-top:1px solid var(--br)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login"><div class="lbox">
<div style="font-size:42px;margin-bottom:16px">📊</div>
<h2>Cuadro Timing</h2>
<p>Dashboard de avance comercial</p>
<input type="password" id="pw" placeholder="••••••••" autofocus onkeydown="if(event.key==='Enter')doLogin()">
<button onclick="doLogin()">Acceder</button>
<div class="lerr" id="lerr">Contraseña incorrecta</div>
</div></div>

<!-- APP -->
<div id="app">
  <div class="hdr"><div class="hdr-top">
    <div><h1>CUADRO TIMING</h1><div class="sub" id="sub"></div></div>
    <div class="kpis" id="kpis"></div>
  </div></div>
  <div class="flt" id="flt"></div>
  <div class="apn" id="apn"></div>
  <div class="insights" id="insights"></div>
  <div class="twrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  <div class="rkn" id="rkn"></div>
  <div class="ftr" id="ftr"></div>
</div>

  function Gamma0256(x){return S(x,7)^S(x,18)^R(x,3);}
  function Gamma1256(x){return S(x,17)^S(x,19)^R(x,10);}
  function str2binb(str){var bin=[];var mask=(1<<chrsz)-1;for(var i=0;i<str.length*chrsz;i+=chrsz)bin[i>>5]|=(str.charCodeAt(i/chrsz)&mask)<<(24-i%32);return bin;}
  function binb2hex(binarray){var hex_tab="0123456789abcdef";var str="";for(var i=0;i<binarray.length*4;i++)str+=hex_tab.charAt((binarray[i>>2]>>((3-i%4)*8+4))&0xF)+hex_tab.charAt((binarray[i>>2]>>((3-i%4)*8))&0xF);return str;}
  function core(m,l){var K=[0x428A2F98,0x71374491,0xB5C0FBCF,0xE9B5DBA5,0x3956C25B,0x59F111F1,0x923F82A4,0xAB1C5ED5,0xD807AA98,0x12835B01,0x243185BE,0x550C7DC3,0x72BE5D74,0x80DEB1FE,0x9BDC06A7,0xC19BF174,0xE49B69C1,0xEFBE4786,0x0FC19DC6,0x240CA1CC,0x2DE92C6F,0x4A7484AA,0x5CB0A9DC,0x76F988DA,0x983E5152,0xA831C66D,0xB00327C8,0xBF597FC7,0xC6E00BF3,0xD5A79147,0x06CA6351,0x14292967,0x27B70A85,0x2E1B2138,0x4D2C6DFC,0x53380D13,0x650A7354,0x766A0ABB,0x81C2C92E,0x92722C85,0xA2BFE8A1,0xA81A664B,0xC24B8B70,0xC76C51A3,0xD192E819,0xD6990624,0xF40E3585,0x106AA070,0x19A4C116,0x1E376C08,0x2748774C,0x34B0BCB5,0x391C0CB3,0x4ED8AA4A,0x5B9CCA4F,0x682E6FF3,0x748F82EE,0x78A5636F,0x84C87814,0x8CC70208,0x90BEFFFA,0xA4506CEB,0xBEF9A3F7,0xC67178F2];
  var HASH=[0x6A09E667,0xBB67AE85,0x3C6EF372,0xA54FF53A,0x510E527F,0x9B05688C,0x1F83D9AB,0x5BE0CD19];
  var W=new Array(64);m[l>>5]|=0x80<<(24-l%32);m[((l+64>>9)<<4)+15]=l;
  for(var i=0;i<m.length;i+=16){var a=HASH[0],b=HASH[1],c=HASH[2],d=HASH[3],e=HASH[4],f=HASH[5],g=HASH[6],h=HASH[7];
  for(var j=0;j<64;j++){if(j<16)W[j]=m[j+i];else W[j]=safe_add(safe_add(safe_add(Gamma1256(W[j-2]),W[j-7]),Gamma0256(W[j-15])),W[j-16]);
  var T1=safe_add(safe_add(safe_add(safe_add(h,Sigma1256(e)),Ch(e,f,g)),K[j]),W[j]);var T2=safe_add(Sigma0256(a),Maj(a,b,c));
  h=g;g=f;f=e;e=safe_add(d,T1);d=c;c=b;b=a;a=safe_add(T1,T2);}
  HASH[0]=safe_add(a,HASH[0]);HASH[1]=safe_add(b,HASH[1]);HASH[2]=safe_add(c,HASH[2]);HASH[3]=safe_add(d,HASH[3]);
  HASH[4]=safe_add(e,HASH[4]);HASH[5]=safe_add(f,HASH[5]);HASH[6]=safe_add(g,HASH[6]);HASH[7]=safe_add(h,HASH[7]);}
  return HASH;}
  return binb2hex(core(str2binb(s),s.length*chrsz));
}

function doLogin(){
  var p=document.getElementById('pw').value;
  var h=sha256(p);
  if(h===PWD_HASH){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    try{
      D=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(B64),function(c){return c.charCodeAt(0);})));
      render();
    }catch(err){
      document.getElementById('app').innerHTML='<div style="padding:40px;color:var(--rd)">Error al cargar datos: '+err.message+'</div>';
    }
  }else{
    var e=document.getElementById('lerr');e.style.display='block';
    document.getElementById('pw').value='';document.getElementById('pw').focus();
    setTimeout(function(){e.style.display='none';},2500);
  }
}

const fm=n=>n.toLocaleString('es-PE',{maximumFractionDigits:0});
const fd=n=>n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fp=n=>(n*100).toFixed(2)+'%';
const MN=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function render(){
  const m=D.meta;
  let rows=D.rows;
  if(F.sede!=='TODAS') rows=rows.filter(r=>r.sede===F.sede);
  let vs=D.secciones;
  if(F.tipo!=='TODOS'){
    if(F.tipo==='SUB_TOTAL') vs=D.secciones.filter(s=>['NF','NI','SUB_TOTAL'].includes(s.nombre));
    else vs=D.secciones.filter(s=>s.nombre===F.tipo);
  }
  renderHeader(m);
  renderKPIs(rows,m);
  renderFilters(m);
  renderAlerts();
  renderInsights(D.rows,m);
  renderTable(rows,vs);
  renderRanking(rows);
  renderFooter(m);
}

function renderHeader(m){
  document.getElementById('sub').textContent=
    MN[m.mes]+' '+m.anio+' — Día '+m.dia+' de '+m.dias_mes+' ('+(m.pct_mes*100).toFixed(1)+'% del mes) | Comparativo: '+MN[m.mes_ant]+' '+m.anio_ant+' día '+m.dia_equiv;
}

function renderKPIs(rows,m){
  const T=D.totals.TOTAL;
  const ad=rows.filter(r=>r.TOTAL&&r.TOTAL.pct_tim>=1).length;
  const at=rows.filter(r=>r.TOTAL&&r.TOTAL.pct_tim<1).length;
  const gap=T.dir*m.pct_mes-T.real;
  document.getElementById('kpis').innerHTML=
    '<div class="kpi"><div class="kpi-v" style="color:'+(T.pct_tim>=1?'var(--gn)':'var(--rd)')+'">'+(T.pct_tim*100).toFixed(1)+'%</div><div class="kpi-l">Timing Total</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:var(--gn)">'+ad+'</div><div class="kpi-l">Adelantadas</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:var(--rd)">'+at+'</div><div class="kpi-l">Atrasadas</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:var(--ac)">'+fd(T.real)+'</div><div class="kpi-l">Venta Real</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:var(--ts)">'+fm(T.dir)+'</div><div class="kpi-l">Meta DIR</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:'+(gap>0?'var(--rd)':'var(--gn)')+'">'+(gap>0?'−':'+')+' '+fm(Math.abs(gap))+'</div><div class="kpi-l">Brecha</div></div>';
}

function renderFilters(m){
  var sOps='';
  D.rows.forEach(function(r){sOps+='<option value="'+r.sede+'" '+(F.sede===r.sede?'selected':'')+'>'+r.sede+' — '+r.sedeFull+'</option>';});
  var tps=['TODOS','NF','NI','SUB_TOTAL','SSFF','TOTAL'];
  var tLb={TODOS:'Todos los tipos',NF:'NF — Necesidad Futura',NI:'NI — Necesidad Inmediata',SUB_TOTAL:'SUB TOTAL (NF+NI)',SSFF:'SSFF — Serv. Funerario',TOTAL:'TOTAL'};
  var tOps='';
  tps.forEach(function(t){tOps+='<option value="'+t+'" '+(F.tipo===t?'selected':'')+'>'+tLb[t]+'</option>';});
  document.getElementById('flt').innerHTML=
    '<div class="fg"><label>Sede</label><select id="fSede"><option value="TODAS" '+(F.sede==='TODAS'?'selected':'')+'>Todas las sedes</option>'+sOps+'</select></div>'+
    '<div class="fg"><label>Tipo de Necesidad</label><select id="fTipo">'+tOps+'</select></div>'+
    '<div class="fsep"></div>'+
    '<div class="fg"><label>Fecha de corte</label><span style="font-size:13px;color:var(--ts);display:flex;align-items:center;gap:6px;padding:7px 0">📅 '+m.dia+' de '+MN[m.mes]+' '+m.anio+'</span></div>';
  document.getElementById('fSede').onchange=function(e){F.sede=e.target.value;render();};
  document.getElementById('fTipo').onchange=function(e){F.tipo=e.target.value;render();};
}

function renderAlerts(){
  var al=D.alertas||[];
  var ap=document.getElementById('apn');
  if(!al.length){ap.innerHTML='';return;}
  var cr=al.filter(function(a){return a.severidad==='critica';}).length;
  var hi=al.filter(function(a){return a.severidad==='alta';}).length;
  var bc=cr>0?'bdg-c':hi>0?'bdg-w':'bdg-o';
  var bt=cr>0?cr+' críticas':hi>0?hi+' altas':'todo ok';
  var items='';
  al.forEach(function(a){items+='<div class="ali '+a.severidad+'"><span>'+a.icono+'</span><span>'+a.mensaje+'</span></div>';});
  ap.innerHTML=
    '<button class="atg" onclick="var l=this.nextElementSibling;l.style.display=l.style.display===\'flex\'?\'none\':\'flex\'">'+
    '⚡ Alertas <span class="bdg '+bc+'">'+bt+'</span>'+
    '<span style="color:var(--tm);font-size:11px">'+al.length+' total — click para ver</span></button>'+
    '<div class="als">'+items+'</div>';
}

function renderInsights(allRows,m){
  var sorted=allRows.filter(function(r){return r.TOTAL;}).sort(function(a,b){return b.TOTAL.pct_tim-a.TOTAL.pct_tim;});
  var top3=sorted.slice(0,3);
  var bot3=sorted.slice(-3).reverse();
  var medals=['🥇','🥈','🥉'];

  // Biggest changes vs previous month
  var changes=allRows.filter(function(r){return r.TOTAL;}).sort(function(a,b){return Math.abs(b.TOTAL.pct_vs)-Math.abs(a.TOTAL.pct_vs);}).slice(0,4);

  // Effort needed
  var daysLeft=m.dias_mes-m.dia;
  var risks=allRows.filter(function(r){return r.TOTAL&&r.TOTAL.pct_tim<1;}).map(function(r){
    var remaining=r.TOTAL.dir-r.TOTAL.real;
    var dailyNeeded=daysLeft>0?remaining/daysLeft:remaining;
    var dailyAvg=m.dia>0?r.TOTAL.real/m.dia:0;
    return{sede:r.sede,full:r.sedeFull,remaining:remaining,dailyNeeded:dailyNeeded,dailyAvg:dailyAvg,ratio:dailyAvg>0?dailyNeeded/dailyAvg:999};
  }).sort(function(a,b){return b.ratio-a.ratio;}).slice(0,4);

  var h='';

  // Top 3
  h+='<div class="ins"><h4>🏆 Top 3 Timing</h4>';
  top3.forEach(function(r,i){
    h+='<div class="ins-i"><span>'+medals[i]+' '+r.sede+' — '+r.sedeFull+'</span><span class="ins-t" style="background:var(--gnb);color:var(--gn)">'+fp(r.TOTAL.pct_tim)+'</span></div>';
  });
  h+='</div>';

  // Bottom 3
  h+='<div class="ins"><h4>⚠️ Sedes con mayor riesgo</h4>';
  bot3.forEach(function(r){
    h+='<div class="ins-i"><span>🔻 '+r.sede+' — '+r.sedeFull+'</span><span class="ins-t" style="background:var(--rdb);color:var(--rd)">'+fp(r.TOTAL.pct_tim)+'</span></div>';
  });
  h+='</div>';

  // Changes vs prev month
  h+='<div class="ins"><h4>📊 Mayor variación vs mes anterior</h4>';
  changes.forEach(function(r){
    var v=r.TOTAL.pct_vs;var g=v>=0;
    h+='<div class="ins-i"><span>'+(g?'📈':'📉')+' '+r.sede+'</span><span class="ins-t" style="background:'+(g?'var(--gnb)':'var(--rdb)')+';color:'+(g?'var(--gn)':'var(--rd)')+'">'+(g?'+':'')+(v*100).toFixed(1)+'pp</span></div>';
  });
  h+='</div>';

  // Effort to close
  h+='<div class="ins"><h4>🎯 Esfuerzo para cerrar meta ('+daysLeft+' días)</h4>';
  if(risks.length){
    risks.forEach(function(r){
      var pct=(r.ratio*100).toFixed(0);
      var color=r.ratio>1.5?'var(--rd)':r.ratio>1.1?'var(--or)':'var(--yl)';
      var bg=r.ratio>1.5?'var(--rdb)':'var(--orb)';
      h+='<div class="ins-i"><span>'+r.sede+': '+fm(r.dailyNeeded)+'/día</span><span class="ins-t" style="background:'+bg+';color:'+color+'">'+pct+'% vs ritmo actual</span></div>';
    });
  }else{
    h+='<div class="ins-i" style="color:var(--gn)">✓ Todas las sedes van en timing</div>';
  }
  h+='</div>';

  document.getElementById('insights').innerHTML=h;
}

function renderTable(rows,visSec){
  var subs=['DIR','REAL','% AVC','% TIM','% vs -1M'];
  var h='<tr><th class="thsd" rowspan="2">SEDE</th>';
  visSec.forEach(function(s){
    var dp=s.nombre==='SUB_TOTAL'||s.nombre==='TOTAL'?' dp':'';
    h+='<th class="ths'+dp+'" colspan="5">'+s.etiqueta+'</th>';
  });
  h+='</tr><tr>';
  visSec.forEach(function(s){
    subs.forEach(function(l,i){h+='<th class="thu'+(i===4?' se':'')+'">'+l+'</th>';});
  });
  h+='</tr>';
  document.getElementById('thead').innerHTML=h;

  var b='';
  rows.forEach(function(r){
    b+='<tr><td class="sc">'+r.sede+'</td>';
    visSec.forEach(function(s){
      var d=r[s.nombre]||{dir:0,real:0,pct_avc:0,pct_tim:0,pct_vs:0};
      b+='<td class="n">'+fm(d.dir)+'</td>';
      b+='<td class="n">'+fd(d.real)+'</td>';
      b+='<td class="p">'+fp(d.pct_avc)+'</td>';
      b+='<td class="'+(d.pct_tim>=1?'tg':'tb')+'">'+(d.pct_tim>=1?'▲':'▼')+' '+fp(d.pct_tim)+'</td>';
      b+='<td class="'+(d.pct_vs>=0?'vg':'vb')+' se">'+(d.pct_vs>=0?'▲':'▼')+' '+fp(d.pct_vs)+'</td>';
    });
    b+='</tr>';
  });

  b+='<tr class="ttr"><td class="sc">TOTAL</td>';
  visSec.forEach(function(s){
    var t=D.totals[s.nombre]||{dir:0,real:0,pct_avc:0,pct_tim:0};
    b+='<td class="n">'+fm(t.dir)+'</td><td class="n">'+fd(t.real)+'</td><td class="p">'+fp(t.pct_avc)+'</td>';
    b+='<td class="p" style="color:'+(t.pct_tim>=1?'var(--gn)':'var(--rd)')+'">'+(t.pct_tim>=1?'▲':'▼')+' '+fp(t.pct_tim)+'</td><td class="p se">—</td>';
  });
  b+='</tr>';
  document.getElementById('tbody').innerHTML=b;
}

function renderRanking(rows){
  var sorted=rows.filter(function(r){return r.TOTAL;}).sort(function(a,b){return b.TOTAL.pct_tim-a.TOTAL.pct_tim;});
  var mx=Math.max.apply(null,sorted.map(function(r){return r.TOTAL.pct_tim;}).concat([1.2]));
  var h='<h3>Ranking % Timing Total</h3>';
  sorted.forEach(function(r){
    var p=r.TOTAL.pct_tim,g=p>=1;
    var w=Math.min((p/mx)*100,100);
    var ml=(1/mx)*100;
    h+='<div class="rki"><span class="rk-s">'+r.sede+'</span>'+
      '<div class="rk-bg"><div class="rk-b '+(g?'g':'b')+'" style="width:'+w+'%"></div><div class="rk-m" style="left:'+ml+'%"></div></div>'+
      '<span class="rk-v" style="color:'+(g?'var(--gn)':'var(--rd)')+'">'+fp(p)+'</span>'+
      '<span class="rk-ic">'+(g?'✓':'✗')+'</span></div>';
  });
  document.getElementById('rkn').innerHTML=h;
}

function renderFooter(m){
  document.getElementById('ftr').textContent='Timing = META DIR × ('+m.dia+'/'+m.dias_mes+') vs REAL acumulado | Último corte: '+m.dia+'/'+m.mes+'/'+m.anio;
}
</script>
</body>
