<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cuadro Timing</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bd:#080c14;--bc:#0e1525;--bca:#121a2e;--bh:#1a2744;--br:rgba(99,145,255,.08);--brb:rgba(99,145,255,.2);--ac:#4d8bff;--tp:#e8edf5;--ts:#7a8ba8;--tm:#4a5a75;--gn:#2dd4a0;--gnb:rgba(45,212,160,.08);--rd:#ff6b7a;--rdb:rgba(255,107,122,.08);--or:#ffb347;--yl:#ffd760}
body{font-family:'Outfit',sans-serif;background:var(--bd);color:var(--tp);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 600px at 15% 10%,rgba(77,139,255,.04) 0%,transparent 70%),radial-gradient(ellipse 600px 400px at 85% 80%,rgba(45,212,160,.03) 0%,transparent 70%);pointer-events:none}

#login{display:flex;align-items:center;justify-content:center;height:100vh;position:relative;z-index:1}
.lb{background:var(--bc);border:1px solid var(--brb);border-radius:16px;padding:40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb h2{font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#fff,var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lb p{font-size:13px;color:var(--ts);margin-bottom:24px}
.lb input{width:100%;padding:12px 16px;background:var(--bd);border:1px solid var(--br);color:var(--tp);border-radius:10px;font-family:'JetBrains Mono';font-size:14px;outline:0;text-align:center;letter-spacing:3px}
.lb input:focus{border-color:var(--ac)}
.lb button{width:100%;padding:12px;margin-top:16px;background:linear-gradient(135deg,var(--ac),#3b6fdb);color:#fff;border:0;border-radius:10px;font-family:'Outfit';font-size:14px;font-weight:600;cursor:pointer}
.lb button:hover{opacity:.9}
.le{color:var(--rd);font-size:12px;margin-top:12px;display:none}

#app{display:none;position:relative;z-index:1}
.hd{padding:20px 24px 16px;border-bottom:1px solid var(--br);background:linear-gradient(180deg,rgba(14,21,37,.9),var(--bd))}
.ht{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hd h1{font-size:22px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#fff,var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@media(max-width:600px){.hd h1{font-size:17px}}
.st{font-size:12px;color:var(--ts);margin-top:4px}
.kr{display:flex;gap:8px;flex-wrap:wrap}
.kp{background:var(--bc);border:1px solid var(--br);border-radius:10px;padding:10px 14px;text-align:center;min-width:90px}
.kv{font-family:'JetBrains Mono';font-size:17px;font-weight:600;line-height:1}
@media(max-width:600px){.kv{font-size:14px}.kp{padding:8px 10px;min-width:72px}}
.kl{font-size:9px;color:var(--ts);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}

.fl{display:flex;gap:12px;padding:12px 24px;flex-wrap:wrap;align-items:flex-end;border-bottom:1px solid var(--br);background:rgba(14,21,37,.5)}
.fg label{display:block;font-size:9px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.fg select{background:var(--bc);border:1px solid var(--br);color:var(--tp);border-radius:8px;padding:7px 10px;font-family:'Outfit';font-size:12px;outline:0;cursor:pointer}
.fg select:focus{border-color:var(--ac)}

.ap{padding:10px 24px}
.at{background:0;border:1px solid var(--br);color:var(--ts);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'Outfit';font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:8px}
.at:hover{border-color:var(--brb)}
.bg{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}.bg.c{background:var(--rd);color:#fff}.bg.w{background:var(--or);color:#1a1a1a}.bg.o{background:var(--gn);color:#1a1a1a}
.al{display:none;flex-direction:column;gap:3px;margin-top:6px}
.ai{padding:6px 12px;border-radius:6px;font-size:11px;display:flex;align-items:center;gap:6px;border:1px solid transparent}
.ai.critica{background:var(--rdb);border-color:rgba(255,107,122,.25);color:var(--rd)}.ai.alta{background:rgba(255,179,71,.08);border-color:rgba(255,179,71,.25);color:var(--or)}.ai.media{background:rgba(255,215,96,.08);border-color:rgba(255,215,96,.25);color:var(--yl)}.ai.info{background:var(--gnb);border-color:rgba(45,212,160,.25);color:var(--gn)}

.tw{padding:10px 16px;overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px}
thead th{position:sticky;top:0;z-index:2;font-weight:600;padding:8px 6px;text-align:center;border-bottom:2px solid var(--brb)}
.ts{background:var(--bca);font-size:12px;font-weight:700;border-right:1px solid var(--brb)}.ts.d{background:linear-gradient(135deg,#111c35,#152040);color:var(--ac)}
.tu{background:var(--bc);font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:.4px;font-weight:500}.tu.e{border-right:1px solid var(--brb)}
th.hs{background:var(--bca);position:sticky;left:0;z-index:3;text-align:left;min-width:60px;border-right:2px solid var(--brb)}
tbody tr{transition:background .1s}tbody tr:hover{background:var(--bh)!important}tbody tr:nth-child(even){background:rgba(14,21,37,.3)}
td{padding:6px;border-bottom:1px solid var(--br);white-space:nowrap;font-family:'JetBrains Mono';font-size:10.5px}
td.s{position:sticky;left:0;z-index:1;background:var(--bd);font-family:'Outfit';font-weight:600;color:var(--ac);font-size:11px;border-right:2px solid var(--brb)}
tbody tr:nth-child(even) td.s{background:rgba(8,12,20,.95)}tbody tr:hover td.s{background:var(--bh)}
td.n{text-align:right}td.p{text-align:center}
td.tg{color:var(--gn);background:var(--gnb);font-weight:600;text-align:center}
td.tb{color:var(--rd);background:var(--rdb);font-weight:600;text-align:center}
td.vg{color:var(--gn);background:var(--gnb);font-weight:500;text-align:center}
td.vb{color:var(--rd);background:var(--rdb);font-weight:500;text-align:center}
td.e{border-right:1px solid var(--brb)}
tr.tt td{background:linear-gradient(90deg,#111c35,#152040)!important;font-weight:700;color:#fff;border-bottom:0;padding:8px 6px}
tr.tt td.s{background:linear-gradient(90deg,#111c35,#152040)!important;color:#fff;font-size:12px}

.rk{padding:8px 24px 24px}.rk h3{font-size:12px;font-weight:600;color:var(--tm);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.ri{display:flex;align-items:center;gap:10px;padding:4px 10px;border-radius:5px;margin-bottom:3px;background:var(--bc);border:1px solid var(--br)}
.rs{width:38px;font-weight:600;font-size:11px;color:var(--ac)}
.rb{flex:1;height:14px;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden;position:relative}
.rf{height:100%;border-radius:3px;transition:width .5s}.rf.g{background:linear-gradient(90deg,var(--gn),rgba(45,212,160,.4))}.rf.b{background:linear-gradient(90deg,var(--rd),rgba(255,107,122,.4))}
.rm{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.2)}
.rv{width:55px;text-align:right;font-family:'JetBrains Mono';font-size:11px;font-weight:600}
.ft{text-align:center;padding:14px;color:var(--tm);font-size:10px;border-top:1px solid var(--br)}
</style>
</head>
<body>
<div id="login"><div class="lb">
<div style="font-size:36px;margin-bottom:16px">📊</div>
<h2>Cuadro Timing</h2>
<p>Ingresa la contraseña para acceder</p>
<input type="password" id="pw" placeholder="••••••••" autofocus onkeydown="if(event.key==='Enter')go()">
<button onclick="go()">Acceder</button>
<div class="le" id="err">Contraseña incorrecta</div>
</div></div>

<div id="app">
<div class="hd"><div class="ht"><div><h1>CUADRO TIMING</h1><div class="st" id="sub"></div></div><div class="kr" id="kpis"></div></div></div>
<div class="fl" id="flt"></div>
<div class="ap" id="alp"></div>
<div class="tw"><table><thead id="th"></thead><tbody id="tb"></tbody></table></div>
<div class="rk" id="rk"></div>
<div class="ft" id="ft"></div>
</div>

async function go(){
  const p=document.getElementById('pw').value;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));
  const h=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(h===H){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    D=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(B),c=>c.charCodeAt(0))));
    R();
  }else{
    const e=document.getElementById('err');e.style.display='block';
    document.getElementById('pw').value='';document.getElementById('pw').focus();
    setTimeout(()=>e.style.display='none',2500);

let D,S={s:'TODAS',t:'TODOS'};
const fm=n=>n.toLocaleString('es-PE',{maximumFractionDigits:0});
const fd=n=>n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fp=n=>(n*100).toFixed(2)+'%';
const M=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function R(){
  const m=D.meta;let rw=D.rows;
  if(S.s!=='TODAS')rw=rw.filter(r=>r.sede===S.s);
  let vs=D.secciones;
  if(S.t!=='TODOS'){if(S.t==='SUB_TOTAL')vs=D.secciones.filter(s=>['NF','NI','SUB_TOTAL'].includes(s.nombre));else vs=D.secciones.filter(s=>s.nombre===S.t);}

  document.getElementById('sub').textContent=`${M[m.mes]} ${m.anio} — Día ${m.dia} de ${m.dias_mes} (${(m.pct_mes*100).toFixed(1)}%) | vs ${M[m.mes_ant]} ${m.anio_ant} día ${m.dia_equiv}`;

  const T=D.totals.TOTAL,ad=rw.filter(r=>r.TOTAL&&r.TOTAL.pct_tim>=1).length,at=rw.filter(r=>r.TOTAL&&r.TOTAL.pct_tim<1).length;
  document.getElementById('kpis').innerHTML=`<div class="kp"><div class="kv" style="color:${T.pct_tim>=1?'var(--gn)':'var(--rd)'}">${(T.pct_tim*100).toFixed(1)}%</div><div class="kl">Timing</div></div><div class="kp"><div class="kv" style="color:var(--gn)">${ad}</div><div class="kl">Adelant.</div></div><div class="kp"><div class="kv" style="color:var(--rd)">${at}</div><div class="kl">Atrasadas</div></div><div class="kp"><div class="kv" style="color:var(--ac)">${fd(T.real)}</div><div class="kl">Real</div></div><div class="kp"><div class="kv" style="color:var(--ts)">${fm(T.dir)}</div><div class="kl">Meta DIR</div></div>`;

  const so=D.rows.map(r=>`<option value="${r.sede}" ${S.s===r.sede?'selected':''}>${r.sede} - ${r.sedeFull}</option>`).join('');
  const tp=['TODOS','NF','NI','SUB_TOTAL','SSFF','TOTAL'],tl={TODOS:'Todos',NF:'NF',NI:'NI',SUB_TOTAL:'SUB TOTAL',SSFF:'SSFF',TOTAL:'TOTAL'};
  const to=tp.map(t=>`<option value="${t}" ${S.t===t?'selected':''}>${tl[t]}</option>`).join('');
  document.getElementById('flt').innerHTML=`<div class="fg"><label>Sede</label><select id="fs"><option value="TODAS">Todas</option>${so}</select></div><div class="fg"><label>Tipo</label><select id="ft">${to}</select></div><div class="fg" style="margin-left:auto"><label>Corte</label><span style="font-size:12px;color:var(--ts)">📅 ${m.dia}/${m.mes}/${m.anio}</span></div>`;
  document.getElementById('fs').onchange=e=>{S.s=e.target.value;R();};
  document.getElementById('ft').onchange=e=>{S.t=e.target.value;R();};

  // Alerts
  const al=D.alertas||[],cr=al.filter(a=>a.severidad==='critica').length,hi=al.filter(a=>a.severidad==='alta').length;
  const ap=document.getElementById('alp');
  if(al.length){const bc=cr>0?'c':hi>0?'w':'o',bt=cr>0?cr+' críticas':hi>0?hi+' altas':'ok';
  ap.innerHTML=`<button class="at" onclick="let l=document.querySelector('.al');l.style.display=l.style.display==='flex'?'none':'flex'">⚡ Alertas <span class="bg ${bc}">${bt}</span><span style="color:var(--tm);font-size:10px">${al.length} total</span></button><div class="al">${al.slice(0,15).map(a=>`<div class="ai ${a.severidad}"><span>${a.icono}</span><span>${a.mensaje}</span></div>`).join('')}</div>`;}else ap.innerHTML='';

  // Table
  const sl=['DIR','REAL','%AVC','%TIM','%vs-1M'];
  let h='<tr><th class="hs" rowspan="2">SEDE</th>';
  vs.forEach(s=>{const d=s.nombre==='SUB_TOTAL'||s.nombre==='TOTAL'?' d':'';h+=`<th class="ts${d}" colspan="5">${s.etiqueta}</th>`;});
  h+='</tr><tr>';vs.forEach(s=>sl.forEach((l,i)=>h+=`<th class="tu${i===4?' e':''}">${l}</th>`));h+='</tr>';
  document.getElementById('th').innerHTML=h;

  let b='';
  rw.forEach(r=>{b+='<tr><td class="s">'+r.sede+'</td>';vs.forEach(s=>{const d=r[s.nombre]||{dir:0,real:0,pct_avc:0,pct_tim:0,pct_vs:0};b+=`<td class="n">${fm(d.dir)}</td><td class="n">${fd(d.real)}</td><td class="p">${fp(d.pct_avc)}</td><td class="${d.pct_tim>=1?'tg':'tb'}">${d.pct_tim>=1?'▲':'▼'} ${fp(d.pct_tim)}</td><td class="${d.pct_vs>=0?'vg':'vb'} e">${d.pct_vs>=0?'▲':'▼'} ${fp(d.pct_vs)}</td>`;});b+='</tr>';});
  b+='<tr class="tt"><td class="s">TOTAL</td>';
  vs.forEach(s=>{const t=D.totals[s.nombre]||{dir:0,real:0,pct_avc:0,pct_tim:0};b+=`<td class="n">${fm(t.dir)}</td><td class="n">${fd(t.real)}</td><td class="p">${fp(t.pct_avc)}</td><td class="p" style="color:${t.pct_tim>=1?'var(--gn)':'var(--rd)'}">${t.pct_tim>=1?'▲':'▼'} ${fp(t.pct_tim)}</td><td class="p e">—</td>`;});
  b+='</tr>';document.getElementById('tb').innerHTML=b;

  // Ranking
  const sr=[...rw].filter(r=>r.TOTAL).sort((a,b)=>b.TOTAL.pct_tim-a.TOTAL.pct_tim),mx=Math.max(...sr.map(r=>r.TOTAL.pct_tim),1.2);
  let k='<h3>Ranking % Timing Total</h3>';
  sr.forEach(r=>{const p=r.TOTAL.pct_tim,g=p>=1,w=Math.min(p/mx*100,100),ml=1/mx*100;k+=`<div class="ri"><span class="rs">${r.sede}</span><div class="rb"><div class="rf ${g?'g':'b'}" style="width:${w}%"></div><div class="rm" style="left:${ml}%"></div></div><span class="rv" style="color:${g?'var(--gn)':'var(--rd)'}">${fp(p)}</span><span style="width:14px;text-align:center;font-size:11px">${g?'✓':'✗'}</span></div>`;});
  document.getElementById('rk').innerHTML=k;
  document.getElementById('ft').textContent=`Timing = META DIR × (${m.dia}/${m.dias_mes}) vs REAL | Corte: ${m.dia}/${m.mes}/${m.anio}`;
}
